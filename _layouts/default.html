<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">

  <!-- Tailwind via CDN (Play CDN) with design-token config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#f7f9fb',
            'surface-dim': '#d8dadc',
            'surface-bright': '#f7f9fb',
            'surface-container-lowest': '#ffffff',
            'surface-container-low': '#f2f4f6',
            'surface-container': '#edf0f2',
            'surface-container-high': '#e7e9eb',
            'surface-container-highest': '#e2e4e5',
            'on-surface': '#0f172a',
            'on-surface-variant': '#475569',
            outline: '#94a3b8',
            'outline-variant': '#cbd5e1',
            primary: '#0f172a',
            'on-primary': '#ffffff',
            'primary-container': '#1e293b',
            'on-primary-container': '#f8fafc',
            secondary: '#334155',
            'on-secondary': '#ffffff',
            'secondary-container': '#475569',
            'on-secondary-container': '#f1f5f9',
            tertiary: '#64748b',
            'on-tertiary': '#ffffff',
            'tertiary-container': '#94a3b8',
            'on-tertiary-container': '#0f172a',
            error: '#b91c1c',
            'on-error': '#ffffff',
            'error-container': '#fef2f2',
            'on-error-container': '#991b1b',
          },
          fontFamily: {
            sans: ['Geist', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% feed_meta %}
</head>
<body class="bg-surface text-on-surface font-sans leading-[1.6] antialiased">

  {% include nav.html %}

  <main class="mx-auto max-w-[1200px] px-6 md:px-16 py-16 md:py-20">
    {{ content }}
  </main>

  {% include footer.html %}

</body>
</html>
