<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Basic modern theme -->
  <style>
    :root {
      --bg: #f5f5f7;
      --bg-elevated: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --border-subtle: #e5e7eb;
      --radius: 10px;
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08);
      --content-width: 760px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #020617;
        --bg-elevated: #020617;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --accent: #60a5fa;
        --accent-soft: #1d283a;
        --border-subtle: #1f2937;
        --shadow-soft: 0 10px 35px rgba(15, 23, 42, 0.65);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      line-height: 1.6;
      color: var(--text);
      background: radial-gradient(circle at top left, #e0f2fe 0, #f5f5f7 40%, #f9fafb 70%);
      padding: 24px 16px 40px;
      display: flex;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: var(--content-width);
      background: var(--bg-elevated);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 24px 20px 32px;
    }

    header {
      border-bottom: 1px solid var(--border-subtle);
      padding-bottom: 14px;
      margin-bottom: 18px;
    }

    .site-title {
      margin: 0 0 4px;
      font-size: 1.5rem;
      letter-spacing: 0.01em;
    }

    .site-tagline {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    nav {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.9rem;
    }

    nav a {
      text-decoration: none;
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(37, 99, 235, 0.2);
      transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.1s ease;
    }

    nav a:hover {
      background: var(--accent);
      color: #ffffff;
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(37, 99, 235, 0.35);
    }

    main {
      margin-top: 12px;
    }

    /* Typography */
    h1, h2, h3 {
      line-height: 1.3;
    }

    h2 {
      margin-top: 1.6rem;
    }

    p {
      margin: 0.6rem 0;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.9rem;
      padding: 0.1em 0.3em;
      border-radius: 4px;
      background: #0f172a0d;
    }

    pre {
      background: #0f172a0d;
      padding: 12px 14px;
      border-radius: 10px;
      overflow-x: auto;
      font-size: 0.9rem;
    }

    /* Post list */
    .post-preview {
      padding: 16px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .post-preview:last-of-type {
      border-bottom: none;
    }

    .post-preview h2 {
      margin-bottom: 4px;
    }

    .post-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .post-preview a.post-link {
      text-decoration: none;
      color: inherit;
    }

    .post-preview a.post-link:hover h2 {
      text-decoration: underline;
    }

    /* “Card” style for standalone posts/pages */
    .content-card {
      background: rgba(248, 250, 252, 0.9);
      border-radius: var(--radius);
      border: 1px solid var(--border-subtle);
      padding: 18px 16px 20px;
      margin-top: 6px;
    }

    /* Footer */
    footer {
      margin-top: 28px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px dotted rgba(148, 163, 184, 0.7);
    }

    footer a:hover {
      color: var(--accent);
    }

    /* Small screens */
    @media (max-width: 600px) {
      .shell {
        padding: 18px 16px 26px;
      }

      .site-title {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1 class="site-title">{{ site.title }}</h1>
      <p class="site-tagline">{{ site.description }}</p>
      <nav>
        <a href="/">Home</a>
        <a href="/bio">Bio</a>
      </nav>
    </header>

    <main>
      <div class="content-card">
        {{ content }}
      </div>
    </main>

    <footer>
      © {{ site.time | date: "%Y" }} {{ site.author }} · Powered by
      <a href="https://jekyllrb.com/">Jekyll</a> &amp; GitHub Pages
    </footer>
  </div>
</body>
</html>
