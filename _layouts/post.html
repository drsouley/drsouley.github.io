---
layout: default
---

<article class="max-w-[680px] mx-auto">

  <header class="mb-10 pb-8 border-b border-outline-variant">
    <p class="text-sm text-on-surface-variant mb-3 tabular-nums">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.categories.size > 0 %}
        &middot; {{ page.categories | join: ", " | upcase }}
      {% endif %}
    </p>
    <h1 class="text-4xl font-bold tracking-[-0.02em] leading-[1.2] text-on-surface">
      {{ page.title }}
    </h1>
  </header>

  <div class="content drop-cap leading-[1.6] text-on-surface">
    {{ content }}
  </div>

  <footer class="mt-16 pt-8 border-t border-outline-variant flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <a href="{{ '/insights/' | relative_url }}"
       class="inline-flex items-center gap-2 px-6 py-3 rounded-sm bg-primary text-on-primary font-semibold text-sm hover:bg-primary-container transition-colors">
      &larr; Continue Reading
    </a>

    {% if page.next %}
      <a href="{{ page.next.url | relative_url }}"
         class="text-sm text-on-surface-variant hover:text-on-surface transition-colors">
        Next: {{ page.next.title }} &rarr;
      </a>
    {% endif %}
  </footer>

</article>
