---
layout: default
---

<div class="max-w-[760px] mx-auto">

  <h1 class="text-2xl font-bold tracking-[-0.02em] mb-6">{{ page.title }}</h1>

  <div class="mb-8">
    <input id="search-input" type="text" placeholder="Search articles..."
           class="w-full px-4 py-3 border border-outline-variant rounded-sm bg-surface-container-lowest text-on-surface placeholder:text-on-surface-variant focus:outline-none focus:border-primary">
    <ul id="search-results" class="mt-2"></ul>
  </div>

  <ul id="archive-list" class="divide-y divide-outline-variant border-t border-b border-outline-variant">
    {% for post in site.posts limit:50 %}
      {% include post-list-item.html post=post %}
    {% endfor %}
  </ul>

</div>

<script src="{{ '/assets/js/search.js' | relative_url }}"></script>
