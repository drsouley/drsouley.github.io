---
layout: default
---

<div class="max-w-[760px] mx-auto">

  <h1 class="text-2xl font-bold tracking-[-0.02em] mb-6">Latest Articles</h1>

  <ul class="divide-y divide-outline-variant border-t border-b border-outline-variant">
    {% for post in site.posts limit:10 %}
      {% include post-list-item.html post=post %}
    {% endfor %}
  </ul>

  <div class="mt-8">
    <a href="{{ '/archive/' | relative_url }}" class="text-sm font-semibold text-on-surface hover:underline">
      View all articles &rarr;
    </a>
  </div>

</div>
