title: "AI Governance & Insights"
description: "Insights, governance notes, and writing on AI regulation and risk."
author: " Soulaiman Hajjaj , DBA(c) MBA Msc CISM CISA CRISC"
baseurl: "" # e.g. "/repo-name" if served from a project page, otherwise leave empty
url: "https://drsouley.github.io"

# --- Build settings ---
markdown: kramdown
permalink: /:title/

collections:
  pages:
    output: true

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# --- Navigation (used in _includes/nav.html) ---
nav:
  - title: "Home"
    url: "/"
  - title: "Archive"
    url: "/archive/"
  - title: "Insights"
    url: "/insights/"
  - title: "Bio"
    url: "/bio/"

# --- Plugins ---
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
